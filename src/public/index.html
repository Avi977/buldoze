<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buldoze Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3248;
      --accent: #f5a623;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 340px;
      text-align: center;
    }

    .login-card .logo { font-size: 2.2rem; margin-bottom: 8px; }
    .login-card h1 { font-size: 1.3rem; margin-bottom: 4px; }
    .login-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }

    .login-card input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
    }

    .login-card input:focus { border-color: var(--accent); }

    .login-card button {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .login-card button:hover { opacity: 0.9; }
    #login-error { color: var(--red); font-size: 0.82rem; margin-top: 10px; min-height: 18px; }

    /* ── App ── */
    #app { display: none; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left .logo { font-size: 1.6rem; }
    .header-left h1 { font-size: 1.1rem; font-weight: 600; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    #live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      transition: background 0.3s;
    }
    #live-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

    #last-refresh { color: var(--muted); font-size: 0.8rem; }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--text); }

    main { padding: 28px; max-width: 1400px; margin: 0 auto; }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }

    .card .label { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .card .value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .card .sub   { font-size: 0.8rem; color: var(--muted); margin-top: 5px; }

    /* ── Section header ── */
    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 14px;
    }

    /* ── Devices grid ── */
    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .device-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
      transition: border-color 0.2s;
    }

    .device-card.active  { border-color: var(--green); }
    .device-card.offline { opacity: 0.55; }
    .device-card.low-battery { border-color: var(--yellow); }

    .device-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .device-name { font-weight: 600; font-size: 0.95rem; }
    .device-id   { font-size: 0.72rem; color: var(--muted); }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-online  { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-active  { background: rgba(34,197,94,0.25); color: var(--green); }
    .badge-offline { background: rgba(100,116,139,0.2); color: var(--muted); }
    .badge-low     { background: rgba(234,179,8,0.2);  color: var(--yellow); }

    .device-stats { display: flex; flex-direction: column; gap: 8px; }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.83rem;
    }
    .stat-row .key { color: var(--muted); }
    .stat-row .val { font-weight: 500; }

    .battery-bar {
      width: 100%;
      height: 5px;
      background: var(--surface2);
      border-radius: 3px;
      margin-top: 2px;
      overflow: hidden;
    }
    .battery-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }

    .countdown {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      margin: 10px 0 4px;
      font-variant-numeric: tabular-nums;
    }
    .countdown.idle { color: var(--muted); font-size: 0.85rem; font-weight: 400; }

    .estop-btn {
      width: 100%;
      margin-top: 12px;
      padding: 7px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      color: var(--red);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .estop-btn:hover { background: rgba(239,68,68,0.25); }
    .estop-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .start-btn {
      width: 100%;
      margin-top: 12px;
      padding: 7px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.4);
      border-radius: 6px;
      color: var(--green);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .start-btn:hover { background: rgba(34,197,94,0.25); }

    /* ── Sessions table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .table-toolbar select,
    .table-toolbar input {
      padding: 7px 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.82rem;
      outline: none;
    }
    .table-toolbar select:focus,
    .table-toolbar input:focus { border-color: var(--accent); }

    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th {
      text-align: left;
      padding: 11px 16px;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .pill-active    { background: rgba(34,197,94,0.15); color: var(--green); }
    .pill-completed { background: rgba(59,130,246,0.15); color: var(--blue); }
    .pill-stopped   { background: rgba(239,68,68,0.15);  color: var(--red); }
    .pill-low_battery { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .pill-pending   { background: rgba(100,116,139,0.15); color: var(--muted); }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--muted);
    }
    .pagination button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination .page-btns { display: flex; gap: 8px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }

    @media (max-width: 600px) {
      main { padding: 16px; }
      header { padding: 14px 16px; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      th, td { padding: 9px 10px; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🚜</div>
    <h1>Buldoze Admin</h1>
    <p>Enter your admin key to continue</p>
    <input type="password" id="api-key-input" placeholder="Admin API key" autocomplete="current-password" />
    <button id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="logo">🚜</span>
      <h1>Buldoze Dashboard</h1>
    </div>
    <div class="header-right">
      <span id="live-dot"></span>
      <span id="last-refresh">—</span>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </header>

  <main>
    <!-- Summary -->
    <div class="summary-grid">
      <div class="card">
        <div class="label">Devices Online</div>
        <div class="value" id="s-online">—</div>
        <div class="sub" id="s-total"></div>
      </div>
      <div class="card">
        <div class="label">Active Sessions</div>
        <div class="value" id="s-active">—</div>
      </div>
      <div class="card">
        <div class="label">Sessions Today</div>
        <div class="value" id="s-today">—</div>
      </div>
      <div class="card">
        <div class="label">Revenue Today</div>
        <div class="value" id="s-revenue">—</div>
      </div>
    </div>

    <!-- Devices -->
    <div class="section-title">Dozers</div>
    <div class="devices-grid" id="devices-grid">
      <div style="color:var(--muted);font-size:0.85rem;">Loading devices…</div>
    </div>

    <!-- Sessions -->
    <div class="section-title">Sessions</div>
    <div class="table-wrap">
      <div class="table-toolbar">
        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="stopped">Stopped</option>
          <option value="low_battery">Low Battery</option>
        </select>
        <select id="filter-device">
          <option value="">All devices</option>
        </select>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Device</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Duration</th>
              <th>Status</th>
              <th>Started</th>
            </tr>
          </thead>
          <tbody id="sessions-body">
            <tr><td colspan="6" style="color:var(--muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <span id="page-info">—</span>
        <div class="page-btns">
          <button id="prev-btn" disabled>← Prev</button>
          <button id="next-btn" disabled>Next →</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script src="/dashboard.js"></script>
</body>
</html>
